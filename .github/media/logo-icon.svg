<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6f4ff"/>
    </linearGradient>
    <g id="flake-arm" stroke="#ffffff" stroke-width="15" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-70"/>
      <line x1="0" y1="-48" x2="-17" y2="-63"/>
      <line x1="0" y1="-48" x2="17" y2="-63"/>
    </g>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- stacked frosted files -->
  <g transform="rotate(-12 512 524)">
    <rect x="332" y="262" width="372" height="500" rx="44" fill="#ffffff" opacity="0.22"/>
    <rect x="360" y="296" width="372" height="500" rx="44" fill="#ffffff" opacity="0.45"/>
    <rect x="388" y="330" width="372" height="500" rx="44" fill="url(#card)"/>
    <!-- list lines on the top card -->
    <g fill="#38bdf8">
      <rect x="436" y="408" width="276" height="32" rx="16"/>
      <rect x="436" y="470" width="276" height="32" rx="16"/>
      <rect x="436" y="532" width="276" height="32" rx="16"/>
      <rect x="436" y="594" width="168" height="32" rx="16"/>
    </g>
  </g>

  <!-- clean 6-arm snowflake -->
  <g transform="translate(792 286)">
    <use href="#flake-arm"/>
    <use href="#flake-arm" transform="rotate(60)"/>
    <use href="#flake-arm" transform="rotate(120)"/>
    <use href="#flake-arm" transform="rotate(180)"/>
    <use href="#flake-arm" transform="rotate(240)"/>
    <use href="#flake-arm" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="11" fill="#ffffff"/>
  </g>
</svg>
